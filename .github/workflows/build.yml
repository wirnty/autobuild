name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip

      - name: Show repo tree
        run: |
          ls -la
          find . -maxdepth 2 -type f

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Inspect dist
        run: |
          ls -la dist
          python -c "import zipfile,glob; f=glob.glob('dist/*.whl')[0]; z=zipfile.ZipFile(f); print('\n'.join(z.namelist()[:200]))"

      - name: Install wheel
        run: pip install dist/*.whl

      - name: Import check
        run: python -c "import autobuilding; print('import ok')"
