name: build

on: [push, pull_request, workflow_dispatch]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install from PyPI
        run: pip install autobuilding

      - name: Import check
        run: python -c "import autobuilding; print('import ok')"

      # OPTIONAL: print where it installed from (debug)
      - name: Show package location
        run: python -c "import autobuilding; print(autobuilding.__file__)"  
