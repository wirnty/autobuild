name: Install Badge Auto

on:
  push:
    branches: [main]

jobs:
  install_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install .
      - run: python -c "import autobuilding"
